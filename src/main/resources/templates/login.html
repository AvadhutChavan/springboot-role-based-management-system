
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Login</title>

<style>
body {
	font-family: Arial, sans-serif;
	background: linear-gradient(135deg, #667eea, #764ba2);
	height: 100vh;
	display: flex;
	justify-content: center;
	align-items: center;
}

.login-container {
	background: white;
	padding: 35px;
	width: 320px;
	border-radius: 10px;
	box-shadow: 0 10px 25px rgba(0, 0, 0, 0.25);
}

h2 {
	text-align: center;
	margin-bottom: 25px;
}

label {
	font-weight: bold;
	font-size: 14px;
}

input {
	width: 100%;
	padding: 10px;
	margin-top: 5px;
	margin-bottom: 18px;
	border-radius: 5px;
	border: 1px solid #ccc;
	font-size: 14px;
}

input:focus {
	outline: none;
	border-color: #667eea;
}

.submit-btn {
	width: 100%;
	padding: 10px;
	background: #667eea;
	border: none;
	color: white;
	font-size: 16px;
	border-radius: 6px;
	cursor: pointer;
	transition: 0.3s;
}

.submit-btn:hover {
	background: #5a67d8;
}

.error-box {
	background: #ffe6e6;
	color: red;
	padding: 10px;
	border: 1px solid red;
	width: 300px;
}

.home-link a {
	text-decoration: none;
	color: #667eea;
	font-size: 14px;
	border-radius: 5px;
	transition: 0.3s;
	baclground: green;
	padding: 5px 10px;
}

.home-link {
	text-align: right;
	margin-bottom: 10px;
}
</style>

</head>

<body>

	<div class="login-container">
		<div class="home-link">
			<a href="/">home</a>
		</div>

		<h2>Login</h2>

		<!-- Error Message -->
		<div class="error-box" th:if="${error}">

			<span th:text="${error}">&nbsp;&nbsp;
				<button onclick="closeError()">❌</button>
			</span>



		</div>

		<form action="/loginUser" method="post">

			<label>Username</label> <input type="text" name="username" required>

			<label>Password</label> <input type="password" name="password"
				required>

			<button class="submit-btn" type="submit">Login</button>

		</form>

	</div>

</body>
<script>
	function closeError() {
		document.querySelector(".error-box").style.display = "none";
	}
</script>
</html>
