<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Signup Form</title>

<style>

body{
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#4facfe,#00f2fe);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    background:white;
    padding:35px;
    width:650px;
    border-radius:10px;
    box-shadow:0 8px 20px rgba(0,0,0,0.2);
}

h2{
    text-align:center;
    margin-bottom:25px;
}

.form-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
}

.form-group{
    display:flex;
    flex-direction:column;
}

label{
    font-weight:bold;
    font-size:14px;
}

input,select{
    padding:8px;
    margin-top:5px;
    border-radius:5px;
    border:1px solid #ccc;
    font-size:14px;
}

input:focus,select:focus{
    outline:none;
    border-color:#4facfe;
}

.submit-btn{
    grid-column:span 2;
    padding:10px;
    background:#4facfe;
    border:none;
    color:white;
    font-size:16px;
    border-radius:6px;
    cursor:pointer;
    transition:0.3s;
}

.submit-btn:hover{
    background:#2d8cf0;
}

.error-box {
	background: #ffe6e6;
	color: red;
	padding: 10px;
	border: 1px solid red;
	width: 300px;
}

.home-link a{

    text-decoration:none;
    color:#ffff;
    font-size:14px;
    border-radius:5px;
    transition:0.3s;
    background:green;
    padding:5px 10px;
}

.home-link{
display:flex;
justify-content:flex-end;
}

</style>

</head>

<body>

<div class="container">
<div class="home-link"> <a href="/">home</a></div>
<h2>Signup Form</h2>

<!-- Error Message -->
		<div class="error-box" th:if="${error}">

			<span th:text="${error}">&nbsp;&nbsp;
				<button onclick="closeError()">❌</button>
			</span>



		</div>

<form th:action="@{/signup}" method="post" th:object="${user}">

<div class="form-grid">

<div class="form-group">
<label>Name</label>
<input type="text" th:field="*{name}">
</div>

<div class="form-group">
<label>DOB</label>
<input type="date" th:field="*{dob}">
</div>

<div class="form-group">
<label>City</label>
<input type="text" th:field="*{city}">
</div>

<div class="form-group">
<label>Gender</label>
<select th:field="*{gender}">
<option value="Male">Male</option>
<option value="Female">Female</option>
</select>
</div>

<div class="form-group">
<label>Blood Group</label>
<input type="text" th:field="*{bloodgroup}">
</div>

<div class="form-group">
<label>Username</label>
<input type="text" th:field="*{username}">
</div>

<div class="form-group">
<label>Password</label>
<input type="password" th:field="*{password}">
</div>

<div class="form-group">
<label>Role</label>
<select th:field="*{role}">
<option value="USER">User</option>
<option value="ADMIN">Admin</option>
<option value="GUEST">Guest</option>
</select>
</div>

<button class="submit-btn" type="submit">Signup</button>

</div>

</form>

</div>

</body>

<script>
	function closeError() {
		document.querySelector(".error-box").style.display = "none";
	}
</script>
</html>
